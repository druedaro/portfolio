<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="100%" style="stop-color:#1e293b" />
    </linearGradient>
    <linearGradient id="redgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171" />
      <stop offset="100%" style="stop-color:#ef4444" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)" />

  <!-- Thin red accent bar top -->
  <rect x="18" y="11" width="28" height="2" rx="1" fill="url(#redgrad)" opacity="0.9"/>

  <!-- D — clean geometric sans paths -->
  <!-- Vertical stem of D -->
  <rect x="14" y="17" width="3.5" height="26" rx="1.5" fill="#f1f5f9" />
  <!-- D curve as arc approximation using a path -->
  <path
    d="M17.5 17 Q34 17 34 30 Q34 43 17.5 43"
    fill="none"
    stroke="#f1f5f9"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Thin separator line between D and R -->
  <rect x="36" y="20" width="1.5" height="20" rx="0.75" fill="#ef4444" opacity="0.5"/>

  <!-- R — geometric -->
  <!-- Vertical stem of R -->
  <rect x="40" y="17" width="3.5" height="26" rx="1.5" fill="url(#redgrad)" />
  <!-- R top bowl (semi-circle) -->
  <path
    d="M43.5 17 Q54 17 54 24.5 Q54 32 43.5 32"
    fill="none"
    stroke="url(#redgrad)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- R leg diagonal -->
  <line x1="44" y1="32" x2="54" y2="43" stroke="url(#redgrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Red dot bottom-right corner accent -->
  <circle cx="53" cy="52" r="2.5" fill="#ef4444" />
</svg>
