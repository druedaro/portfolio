<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
  </defs>

  <style>
    .letters {
      stroke: #0f172a; /* slate-900 for light mode */
    }
    @media (prefers-color-scheme: dark) {
      .letters {
        stroke: #ffffff; /* white for dark mode */
      }
    }
  </style>

  <!-- "dr" letters -->
  <g class="letters" stroke-width="6.5" stroke-linecap="round" fill="none">
    <!-- d: stem -->
    <line x1="26" y1="17" x2="26" y2="47" />
    <!-- d: bowl -->
    <circle cx="16.5" cy="37.5" r="9.5" />
    
    <!-- r: stem -->
    <line x1="39" y1="27" x2="39" y2="47" />
    <!-- r: branch -->
    <path d="M 39 35 Q 44 26 49 28.5" />
  </g>

  <!-- red dot "." -->
  <circle cx="55" cy="46" r="4.5" fill="url(#redGlow)" />
</svg>
